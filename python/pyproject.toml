[project]
name = "rostermonster"
version = "0.1.0"
description = "Roster Monster v2 — local-first Python compute pipeline (M2)"
requires-python = ">=3.11"
authors = [{ name = "Roster Monster maintainers" }]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["rostermonster*"]
exclude = ["tests*"]
