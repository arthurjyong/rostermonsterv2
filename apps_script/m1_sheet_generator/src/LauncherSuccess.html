<div class="success-view">
  <h2>Sheet generated</h2>
  <p>Open the generated sheet and verify the structure, then share it with doctors.</p>
  <p>
    <a id="result-link" target="_blank" rel="noopener">(link)</a>
  </p>
  <p class="share-hint" id="share-hint"></p>

  <h3>Run details</h3>
  <dl class="run-details">
    <dt>Output mode</dt><dd id="result-mode"></dd>
    <dt>Spreadsheet</dt><dd id="result-spreadsheet-name"></dd>
    <dt>Tab</dt><dd id="result-sheet-name"></dd>
    <dt>Start date</dt><dd id="result-period-start"></dd>
    <dt>End date</dt><dd id="result-period-end"></dd>
    <dt>ICU only</dt><dd id="result-icu-only"></dd>
    <dt>ICU + HD</dt><dd id="result-icu-hd"></dd>
    <dt>HD only</dt><dd id="result-hd-only"></dd>
  </dl>

  <p>
    <button type="button" id="result-reload" class="secondary">Generate another sheet</button>
  </p>
</div>
