; Root-level pytest config so `pytest` invoked from the repo root
; (rather than from `python/`) picks up the same marker registration +
; addopts as `python/pyproject.toml`'s `[tool.pytest.ini_options]`.
;
; Codex P2 finding on PR #150 commit 9ee9322da1: when CI / Codex run
; `pytest` from `/workspace/rostermonsterv2`, pytest's config-discovery
; walk doesn't reach `python/pyproject.toml` (the latter is below the
; rootdir derived from the cwd), so the `slow` marker registration +
; `-m 'not slow'` addopts don't apply — `PytestUnknownMarkWarning` +
; full 22min sweep including audit / integration. Mirroring the
; config here closes that gap; pytest still picks the closer
; `python/pyproject.toml` when invoked from `cd python && pytest`.
;
; Keep `testpaths = python/tests` here so root-level invocations don't
; sweep non-test directories (apps_script, docs, cloud_compute_service)
; or report empty collection. The duplicated config (marker + addopts)
; MUST stay byte-identical to `python/pyproject.toml`'s ini_options or
; default behavior diverges between `pytest` from root vs `cd python`.

[pytest]
testpaths = python/tests
markers =
    slow: marks tests that run real LAHC solver at FW-0037 elbow tuple — multi-minute, deselect by default
addopts = -m 'not slow'
